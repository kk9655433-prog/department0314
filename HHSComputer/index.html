<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電腦入侵中……</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:url('/department0314/images/XP.jpg') no-repeat center/cover;
  font-family:system-ui;
}
  
.desktop{
  height:100%;
  padding-top:2vh;
  padding-left:0.5vw;
  display:flex;
  flex-direction:column;
  gap:20px;
}
  
.icon{
  width:90px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  text-align:center;
  color:white;
  cursor:pointer;
  text-shadow:0 2px 4px black;
  user-select:none;
}

.icon img{
  width:48px;
  height:auto;
  display:block;
  margin-bottom:6px;
}

.icon span{
  display:block;
  width:100%;
  word-break:break-all;
}

.close-btn{
  position:absolute;
  top:15px;
  right:20px;
  font-size:22px;
  color:#00e5ff;
  cursor:pointer;
  text-shadow:0 0 10px rgba(0,255,255,0.8);
  transition:.2s;
}

.close-btn:hover{
  transform:scale(1.2);
}
  
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9999;
}
.modal.active{opacity:1;pointer-events:auto;}

.modal-content{
  position:relative;
  width:90%;
  max-width:1100px;
  max-height:90vh;
  overflow:auto;
  border-radius:8px;
  color:white;
}

.document-bg{
  background:url('/department0314/images/XP.jpg') no-repeat center/cover;
  position:relative;
  padding:60px;
}
.document-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
}
.document{
  position:relative;
  z-index:2;
  line-height:1.9;
  font-size:16px;
}
.doc-header{
  text-align:center;
  padding:25px;
  margin-bottom:40px;
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}
.meta-box{
  border:1px solid rgba(255,255,255,0.3);
  padding:15px;
  margin-top:10px;
  font-size:14px;
}

.redacted-group p{
  margin: 0 0 18px 0;
}

.redacted-group{
  display:block;
}

.redacted-group{
  display:block;
  cursor:pointer;
}

.redacted-group:not(.revealed){
  background:black;
  color:transparent;
  user-select:none;
  border-radius:3px;
  padding:4px 6px;
}

.redacted-group.revealed{
  background:none;
  color:white;
  user-select:text;
}

/* 權限提示框 */
.auth-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  color:#00e5ff;
  padding:30px 50px;
  border:1px solid #00e5ff;
  z-index:10000;
  text-align:center;
  font-size:18px;
  box-shadow:0 0 25px rgba(0,255,255,.5);
}

/* 密碼 */
.pwd{
  width:50px;height:50px;
  font-size:24px;text-align:center;
}
#pwdConfirm{
  display:block;margin:20px auto 0;
  padding:6px 18px;
}

/* Chrome / Edge / Safari */
.modal-content::-webkit-scrollbar {
  width: 10px;
}

.modal-content::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.6);
  border-left: 1px solid rgba(0,255,255,0.2);
}

.modal-content::-webkit-scrollbar-thumb {
  background: linear-gradient(
    180deg,
    rgba(0,255,255,0.6),
    rgba(0,150,255,0.6)
  );
  border-radius: 6px;
  box-shadow: 0 0 8px rgba(0,255,255,0.6);
}

.modal-content::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(
    180deg,
    rgba(0,255,255,0.9),
    rgba(0,150,255,0.9)
  );
}

/* Firefox */
.modal-content {
  scrollbar-width: thin;
  scrollbar-color: rgba(0,255,255,0.7) rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<div class="desktop">
  <div class="icon" onclick="querySystemGate()">
    <img src="/department0314/icons/query.png">
    <span>查詢系統</span>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
const modal=document.getElementById('modal');
const modalBody=document.getElementById('modalBody');

function openModal(html){
  modalBody.innerHTML = `
    <div class="close-btn" onclick="closeModal()">✕</div>
    ${html}
  `;
  modal.classList.add('active');
}
function closeModal(){
  modal.classList.remove('active');
  modalBody.innerHTML='';
}

/* ===== 文件 ===== */

const fileMap={
"GHMA-114-DRAFT":"doc114",
"GHMA-833-STASH":"doc833"
};

const documents={

doc114:`
<div class="document-bg"><div class="document">
<div class="doc-header">
<h2>哥譚市醫療法案第114條草案（節錄）</h2>
<div class="meta-box">
法案名稱：《公民健康監測與人工智能資料整合條例》<br>
提案單位：哥譚市政府衛生署<br>
提案人：市長 漢密爾頓·希爾（Hamilton Hill）<br>
檔案編號：GHMA-114-Draft
</div></div>

一、立法目的<br><br>
為提升哥譚市公共衛生資源配置效率，預防重大傳染病與精神疾病事件，特制定本條例，以整合醫療院所資料、建立人工智能運算平台，並確保公民健康數據之安全管理與政策運用。<br><br>
二、法條細項<br><br>
 第1條 設立人工智能健康平台<br>
 市政府應委託合法醫療科技公司建立「重生計畫」系統，作為全市公民健康資料整合與分析之主要平台。平台之運作應遵循資料最小化原則，僅收集診斷、基因與精神評估等必要資訊。市政府得依需要授權執法人員、醫療研究單位及保險公司部分查閱。<br><br>

 第2條 監督與審查機制<br>
 成立「人工智能醫療監督委員會」，由市長提名七人組成。委員任期四年，得連任一次。監督委員會應每半年發布資料運作報告，並接受議會質詢。<br>
 委員會可聘請顧問單位進行外部審計（2018年指定為索恩集團）。<br><br>

第3條 ＂配型審核限制<br>
凡經哥譚市醫療倫理審議委員會（或市立特別醫療小組）認定之特定緊急病患，其治療方案得豁免既有的器官配型優先序、藥物臨床試驗審核或標準治療流程之限制。<br><br>
特定緊急病患得不經由常規的分配審議、風險評估與倫理聽證程序，立即啟動治療方案。相關治療紀錄與流程文件，將由專屬加密系統進行歸檔封存，並嚴禁向任何未授權之第三方公開。哥譚市醫療倫理審議委員會已授權希望醫療暨生技器材公司，作為本特別條款之唯一執行與監管代表。＂<br><br>

第4條 違規處罰<br>
故意散布偽造資料者，處一年以下有期徒刑或罰金。<br>
公務員違反保密義務者，除刑事處分外並停止公職。<br>
</div></div>
`,

doc833:`
<div class="document-bg"><div class="document">
<div class="doc-header">
<h2>內部專案協調會議紀錄</h2>
<div class="meta-box">
保密等級：絕對機密<br>
保存期限：永久列管<br>
流通限制：限列名人員閱覽，不得複製、轉載或摘錄<br>
會議時間：2025年1月14日 00:10–01:32<br>
會議地點：地下行政會議室 B3<br>
與會人員：漢密爾頓·希爾、伊奧柏德·索恩、卡邁恩·法爾科尼、瑟琳娜·凱爾、哈維·布洛克<br>
檔案編號：GHMA-833-Stash
</div></div>

＂
<p>一、議題一：器官來源穩定性</p>

<p>醫療主管報告，目前合法器官捐贈來源無法滿足專案需求，尤其心臟與肝臟之配型成功率過低，影響專案進度。</p>

<p>資源調度官提出以下方案：</p>

<p>通過「重生計畫」後台資料從特定年齡層（18–35歲）篩選健康個體，透過第三方單位進行接觸、轉移及手術。</p>

<p>所有標的個體一律以「Subject編碼」管理，不保留完整姓名於核心檔案。</p>

<p>會中確認，相關個體不列入正式醫療紀錄系統。</p>

<p>二、議題二：摘除與分配流程</p>

<p>專案醫療主管說明：</p>

<p>器官摘除將於專屬設施進行，不進入公立醫療體系，器官依適配性進行分級，優先供應給「核心投資人名單」。</p>

<p>手術紀錄僅保留技術數據，不保留來源資料。</p>

<p>財務代表強調，投資方對供應穩定性已有明確期待，若進度延誤，將影響後續資金撥付。</p>

<p>三、議題三：失蹤人口關聯風險</p>

<p>風險管控顧問指出，近期失蹤人口數量增加，可能與優先名單池時間軸重疊。</p>

<p>建議措由其他部門對外說明為自願離境或個人因素，必要時製造數起獨立刑事案件轉移焦點並嚴格控管內部人員通訊紀錄。</p>

<p>四、決議</p>

<p>擴大優先名單池規模。</p>

<p>器官來源作業全程非書面化，僅留加密電子摘要。</p>

<p>若有洩密跡象，立即啟動人員隔離與責任切割機制。</p>
＂
</div></div>
`
};

/* ===== 黑框轉換（整段遮蔽） ===== */
function renderDocument(html){
  html = html.split('\n').map(line => {
    if(line.trim() === '') return line; 
    return `<span class="redacted-group">${line}</span>`;
  }).join('\n');

  openModal(html);

  document.querySelectorAll('.redacted-group').forEach(group=>{
    group.onclick = ()=> startAuth(group);
  });
}

/* ===== 權限流程 ===== */
function startAuth(group){

  if(group.classList.contains('revealed')) return;

  const auth=document.createElement('div');
  auth.className="auth-box";
  document.body.appendChild(auth);

  let dots=0;
  const dotInterval=setInterval(()=>{
    dots=(dots+1)%4;
    auth.innerHTML="確認權限中"+ ".".repeat(dots);
  },500);

  setTimeout(()=>{
    auth.innerHTML="確認完成<br>權限已解鎖...";
    clearInterval(dotInterval);
  },3000);

  setTimeout(()=>{
    auth.remove();
    group.classList.add('revealed');
  },5000);
}
/* ===== 密碼輸入 ===== */
function querySystemGate(){

  openModal(`
  <p style="text-align:center">請輸入檔案編號</p>
  <div style="display:flex;justify-content:center;gap:4px;">
  ${'<input class="pwd start" maxlength="1">'.repeat(4)}
  <span>-</span>
  ${'<input class="pwd mid" maxlength="1">'.repeat(3)}
  <span>-</span>
  ${'<input class="pwd end" maxlength="1">'.repeat(5)}
  </div>
  <button id="pwdConfirm">確定</button>
  `);

  const inputs=[...document.querySelectorAll('.pwd')];

  function submitPassword(){
    const starts=[...document.querySelectorAll('.start')].map(i=>i.value).join('');
    const mids=[...document.querySelectorAll('.mid')].map(i=>i.value).join('');
    const ends=[...document.querySelectorAll('.end')].map(i=>i.value).join('');
    const val=`${starts}-${mids}-${ends}`;

    if(fileMap[val]){
      renderDocument(documents[fileMap[val]]);
    }else{
      alert("查無此檔案");
    }
  }

  inputs.forEach((input,idx)=>{

    input.addEventListener('input', ()=>{
      if(input.classList.contains('mid')){
        input.value = input.value.replace(/\D/g,'');
      } else {
        input.value = input.value.toUpperCase().replace(/[^A-Z]/g,'');
      }
      if(input.value && inputs[idx+1]) inputs[idx+1].focus();
    });

    input.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        submitPassword();
      }

      if(e.key==='Backspace'){
        if(input.value === '' && idx>0){
          inputs[idx-1].focus();
          inputs[idx-1].value = '';
        }
      }

      if(e.key==='ArrowLeft' && idx>0){
        inputs[idx-1].focus();
      }

      if(e.key==='ArrowRight' && idx<inputs.length-1){
        inputs[idx+1].focus();
      }
    });

  });

  document.getElementById('pwdConfirm').onclick = submitPassword;

}
  modal.addEventListener('click', e=>{
  if(e.target === modal){
    closeModal();
  }
});
</script>

</body>
</html>
