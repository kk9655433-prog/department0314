<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電腦入侵中……</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:url('/department0314/images/XP.jpg') no-repeat center/cover;
  font-family:system-ui;
}
.desktop{
  height:100%;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  align-items:flex-start;
}
.icon{
  width:80px;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  color:white;
  font-size:14px;
  text-align:center;
  text-shadow:0 2px 4px black;
}
.icon img{
  width:48px;
  height:48px;
  margin-bottom:6px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9999;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}
.modal-content{
  position:relative;
  width:90%;
  max-width:1100px;
  max-height:90vh;
  overflow:auto;
  border-radius:10px;
  color:white;
}
.document-bg{
  background:url('/department0314/images/XP.jpg') no-repeat center/cover;
  position:relative;
  padding:50px;
}
.document-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
}
.document{
  position:relative;
  z-index:2;
  line-height:1.9;
  font-size:16px;
}
.doc-header{
  text-align:center;
  margin-bottom:40px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}
.doc-header h2{
  margin:0 0 15px 0;
  letter-spacing:2px;
}
.meta-box{
  border:1px solid rgba(255,255,255,0.3);
  padding:15px;
  margin-top:10px;
  font-size:14px;
  opacity:.9;
}

.redacted{
  background:black;
  color:black;
  cursor:pointer;
}
.redacted.revealed{
  background:transparent;
  color:#00e5ff;
  font-weight:bold;
}

.close-btn{
  position:absolute;
  top:8px;
  right:12px;
  background:#c62828;
  border:none;
  color:white;
  padding:4px 10px;
  border-radius:4px;
  cursor:pointer;
}

.pwd{
  width:50px;
  height:50px;
  font-size:24px;
  text-align:center;
  border-radius:6px;
  border:1px solid #ccc;
}
#pwdConfirm{
  display:block;
  margin:20px auto 0;
  padding:6px 18px;
  background:#0a64ad;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="desktop">
  <div class="icon" data-type="query">
    <img src="/department0314/icons/query.png">查詢系統
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalBody">
    <button class="close-btn" id="closeBtn">X</button>
  </div>
</div>

<script>
const modal=document.getElementById('modal');
const modalBody=document.getElementById('modalBody');

function openModal(html){
  modalBody.innerHTML=`<button class="close-btn" id="closeBtn">X</button>`+html;
  modal.classList.add('active');
  document.getElementById('closeBtn').onclick=closeModal;
}
function closeModal(){
  modal.classList.remove('active');
  modalBody.innerHTML='';
  document.onkeydown=null;
}

/* ===== 檔案對應 ===== */
const fileMap={
"GHMA-114-DRAFT":"doc114",
"GHMA-833-STASH":"doc833"
};

/* ===== 文件內容 ===== */
const documents={

doc114:`
<div class="document-bg"><div class="document">
<div class="doc-header">
<h2>哥譚市醫療法案第114條草案（節錄）</h2>
<div class="meta-box">
法案名稱：《公民健康監測與人工智能資料整合條例》<br>
提案單位：哥譚市政府衛生署<br>
提案人：市長 漢密爾頓·希爾（Hamilton Hill）<br>
檔案編號：GHMA-114-Draft
</div></div>

一、立法目的<br>
為提升哥譚市公共衛生資源配置效率...<br><br>

第3條 ＂凡經哥譚市醫療倫理審議委員會（或市立特別醫療小組）認定之特定緊急病患，其治療方案得豁免既有的器官配型優先序、藥物臨床試驗審核或標準治療流程之限制。

特定緊急病患得不經由常規的分配審議、風險評估與倫理聽證程序，立即啟動治療方案。相關治療紀錄與流程文件，將由專屬加密系統進行歸檔封存，並嚴禁向任何未授權之第三方公開。哥譚市醫療倫理審議委員會已授權希望醫療暨生技器材公司，作為本特別條款之唯一執行與監管代表。＂
</div></div>
`,

doc833:`
<div class="document-bg"><div class="document">
<div class="doc-header">
<h2>內部專案協調會議紀錄</h2>
<div class="meta-box">
保密等級：絕對機密<br>
保存期限：永久列管<br>
流通限制：限列名人員閱覽<br>
會議時間：2025年1月14日 00:10–01:32<br>
會議地點：地下行政會議室 B3<br>
檔案編號：GHMA-833-Stash
</div></div>

一、議題一：器官來源穩定性<br>
醫療主管報告，目前合法器官捐贈來源無法滿足專案需求...<br><br>

四、決議<br>
擴大優先名單池規模。<br>
器官來源作業全程非書面化，僅留加密電子摘要。
</div></div>
`
};

/* ===== 黑框轉換（逐字遮蔽） ===== */
function renderDocument(html){
html=html.replace(/＂([\s\S]*?)＂/g,(m,p)=>{
let blocks='';
for(let char of p){
if(char==='\n'){
blocks+='<br>';
}else{
blocks+='<span class="redacted" data-char="'+char.replace(/"/g,'&quot;')+'">█</span>';
}
}
return blocks;
});
openModal(html);
document.querySelectorAll('.redacted').forEach(el=>{
el.onclick=()=>{
el.textContent=el.dataset.char;
el.classList.add('revealed');
};
});
}

/* ===== 分字密碼輸入 ===== */
function querySystemGate(){
openModal(`
<p style="text-align:center">請輸入檔案編號</p>
<div style="display:flex;justify-content:center;gap:4px;">
${'<input class="pwd start" maxlength="1">'.repeat(4)}
<span>-</span>
${'<input class="pwd mid" maxlength="1">'.repeat(3)}
<span>-</span>
${'<input class="pwd end" maxlength="1">'.repeat(5)}
</div>
<button id="pwdConfirm">確定</button>
`);

const starts=[...document.querySelectorAll('.start')];
const mids=[...document.querySelectorAll('.mid')];
const ends=[...document.querySelectorAll('.end')];
const inputs=[...starts,...mids,...ends];

inputs.forEach((input,i)=>{
input.addEventListener('input',()=>{
input.value=input.value.toUpperCase();  // 自動轉大寫
if(input.value&&inputs[i+1])inputs[i+1].focus();
});
input.addEventListener('keydown',e=>{
if(e.key==='Backspace'&&!input.value&&i>0){
inputs[i-1].focus();
}
});
});

function check(){
const val=`${starts.map(i=>i.value).join('')}-${mids.map(i=>i.value).join('')}-${ends.map(i=>i.value).join('')}`;
if(fileMap[val]){
renderDocument(documents[fileMap[val]]);
}else{
alert("查無此檔案");
}
}
document.getElementById('pwdConfirm').onclick=check;
document.onkeydown=e=>{if(e.key==='Enter')check();}
}

document.querySelector('.icon').onclick=querySystemGate;
</script>

</body>
</html>
